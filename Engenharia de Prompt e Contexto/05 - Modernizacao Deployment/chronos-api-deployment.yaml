---
# Secret (criar separadamente via CI/CD ou external-secrets)
apiVersion: v1
kind: Secret
metadata:
  name: chronos-api-secrets
  namespace: production
type: Opaque
data:
  db-password: ""  # Injetar via pipeline: echo -n "PASSWORD" | base64
  jwt-secret: ""   # Injetar via pipeline: echo -n "SECRET" | base64

---
# Deployment modernizado com boas práticas de produção
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chronos-api
  namespace: production
  labels:
    app: chronos-api
    version: v1
spec:
  replicas: 3  # Alta disponibilidade
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: chronos-api
  template:
    metadata:
      labels:
        app: chronos-api
    spec:
      # Security context a nível de pod
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      # Distribuição de pods entre nós
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - chronos-api
              topologyKey: kubernetes.io/hostname

      containers:
      - name: api
        # Imagem com versão específica (não "latest")
        image: chronos-api:v1.2.3
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP

        # Variáveis de ambiente
        env:
        - name: PORT
          value: "8080"
        - name: ENVIRONMENT
          value: "production"

        # Secrets injetados como variáveis de ambiente
        envFrom:
        - secretRef:
            name: chronos-api-secrets

        # Resource requests e limits
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"

        # Security context a nível de container
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL

        # Readiness Probe - quando incluir em load balancer
        readinessProbe:
          httpGet:
            path: /health/ready
            port: http
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 2
          successThreshold: 1
          failureThreshold: 3

        # Liveness Probe - quando reiniciar pod
        livenessProbe:
          httpGet:
            path: /health/live
            port: http
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 3

        # Volumes para arquivos temporários
        volumeMounts:
        - name: tmp
          mountPath: /tmp

      # Volumes efêmeros
      volumes:
      - name: tmp
        emptyDir: {}

      # Configurações de encerramento gracioso
      terminationGracePeriodSeconds: 30

---
# Service
apiVersion: v1
kind: Service
metadata:
  name: chronos-api
  namespace: production
  labels:
    app: chronos-api
spec:
  type: ClusterIP
  selector:
    app: chronos-api
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP

---
# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: chronos-api
  namespace: production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: chronos-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70

---
# Pod Disruption Budget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: chronos-api
  namespace: production
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: chronos-api
